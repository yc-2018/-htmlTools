<style>
  .lighting-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    margin-top: 24px;
  }

  .lighting-card {
    cursor: pointer;
    overflow: hidden;
  }

  .lighting-card .card-image {
    display: grid;
    min-height: 250px;
    place-items: center;
    background:
      radial-gradient(circle at 75% 24%, rgba(255, 248, 218, 0.22), transparent 26%),
      linear-gradient(145deg, #121d26, #071016 72%);
  }

  .earth-preview {
    width: min(210px, 78%);
    height: auto;
    filter: drop-shadow(0 0 22px rgba(102, 194, 222, 0.19));
  }

  .sun-arrow {
    color: #f4d88b;
    font-size: 12px;
    letter-spacing: 0.08em;
    margin-bottom: -14px;
    text-transform: uppercase;
  }

  .lighting-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 12px;
  }

  .lighting-meta span {
    border: 1px solid rgba(127, 148, 161, 0.35);
    border-radius: 999px;
    color: #8094a0;
    font-size: 12px;
    padding: 3px 8px;
  }

  .recommended {
    color: #5d93a8;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @media (max-width: 860px) {
    .lighting-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<h2>地球昼夜明暗：你更喜欢哪一档？</h2>
<p class="subtitle">太阳固定在画面右上方。三档都保留点云原色，只改变每个点随朝向产生的亮度；点击卡片即可选择。</p>

<div class="cards lighting-grid">
  <div class="card lighting-card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="sun-arrow">☀ 阳光来自右上 ↙</div>
      <svg class="earth-preview" viewBox="0 0 240 240" role="img" aria-label="轻柔光照预览">
        <defs>
          <radialGradient id="light-a" cx="73%" cy="27%" r="86%">
            <stop offset="0" stop-color="#a9def0"/>
            <stop offset="48%" stop-color="#6aaec5"/>
            <stop offset="76%" stop-color="#4c7f91"/>
            <stop offset="100%" stop-color="#3d626f"/>
          </radialGradient>
          <pattern id="dots-a" width="7" height="7" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.25" fill="#d8edf4" opacity="0.72"/>
          </pattern>
          <clipPath id="clip-a"><circle cx="120" cy="120" r="92"/></clipPath>
        </defs>
        <circle cx="120" cy="120" r="96" fill="none" stroke="#bfe9f5" stroke-opacity="0.18" stroke-width="7"/>
        <circle cx="120" cy="120" r="92" fill="url(#light-a)"/>
        <g clip-path="url(#clip-a)" opacity="0.72">
          <path d="M62 70l21-19 29 5 13 15-8 19 16 12-10 18-21-4-14 13-22-8-12-26zM139 65l26-10 25 18 4 23-14 11-5 29-19 11-12-18 5-20-18-16zM105 144l21-9 19 14-7 19-18 23-18-13z" fill="#747a7d" opacity="0.93"/>
          <path d="M139 65l26-10 25 18 4 23-14 11-5 29-19 11-12-18 5-20-18-16z" fill="#d94f5c" opacity="0.66"/>
          <rect x="24" y="24" width="192" height="192" fill="url(#dots-a)"/>
        </g>
      </svg>
    </div>
    <div class="card-body">
      <h3>A · 轻柔</h3>
      <p>暗面约降 12%，亮面约升 6%。变化克制，页面文字最不受干扰。</p>
      <div class="lighting-meta"><span>柔和分界</span><span>最低对比</span></div>
    </div>
  </div>

  <div class="card lighting-card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="sun-arrow">☀ 阳光来自右上 ↙</div>
      <svg class="earth-preview" viewBox="0 0 240 240" role="img" aria-label="平衡光照预览">
        <defs>
          <radialGradient id="light-b" cx="73%" cy="27%" r="86%">
            <stop offset="0" stop-color="#c6eff9"/>
            <stop offset="45%" stop-color="#70b7cf"/>
            <stop offset="72%" stop-color="#3d6c7d"/>
            <stop offset="100%" stop-color="#263f49"/>
          </radialGradient>
          <pattern id="dots-b" width="7" height="7" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.25" fill="#e3f4f8" opacity="0.78"/>
          </pattern>
          <clipPath id="clip-b"><circle cx="120" cy="120" r="92"/></clipPath>
        </defs>
        <circle cx="120" cy="120" r="96" fill="none" stroke="#bfe9f5" stroke-opacity="0.2" stroke-width="7"/>
        <circle cx="120" cy="120" r="92" fill="url(#light-b)"/>
        <g clip-path="url(#clip-b)" opacity="0.76">
          <path d="M62 70l21-19 29 5 13 15-8 19 16 12-10 18-21-4-14 13-22-8-12-26zM139 65l26-10 25 18 4 23-14 11-5 29-19 11-12-18 5-20-18-16zM105 144l21-9 19 14-7 19-18 23-18-13z" fill="#747a7d" opacity="0.93"/>
          <path d="M139 65l26-10 25 18 4 23-14 11-5 29-19 11-12-18 5-20-18-16z" fill="#d94f5c" opacity="0.72"/>
          <rect x="24" y="24" width="192" height="192" fill="url(#dots-b)"/>
        </g>
      </svg>
    </div>
    <div class="card-body">
      <div class="recommended">推荐</div>
      <h3>B · 平衡</h3>
      <p>暗面约降 24%，亮面约升 10%。球体感清楚，仍符合“只亮暗一点点”。</p>
      <div class="lighting-meta"><span>柔和晨昏线</span><span>立体感适中</span></div>
    </div>
  </div>

  <div class="card lighting-card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="sun-arrow">☀ 阳光来自右上 ↙</div>
      <svg class="earth-preview" viewBox="0 0 240 240" role="img" aria-label="明显光照预览">
        <defs>
          <radialGradient id="light-c" cx="73%" cy="27%" r="86%">
            <stop offset="0" stop-color="#e0f7fb"/>
            <stop offset="40%" stop-color="#78bfd6"/>
            <stop offset="64%" stop-color="#355d6b"/>
            <stop offset="100%" stop-color="#13242b"/>
          </radialGradient>
          <pattern id="dots-c" width="7" height="7" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.25" fill="#effbfc" opacity="0.83"/>
          </pattern>
          <clipPath id="clip-c"><circle cx="120" cy="120" r="92"/></clipPath>
        </defs>
        <circle cx="120" cy="120" r="96" fill="none" stroke="#bfe9f5" stroke-opacity="0.21" stroke-width="7"/>
        <circle cx="120" cy="120" r="92" fill="url(#light-c)"/>
        <g clip-path="url(#clip-c)" opacity="0.8">
          <path d="M62 70l21-19 29 5 13 15-8 19 16 12-10 18-21-4-14 13-22-8-12-26zM139 65l26-10 25 18 4 23-14 11-5 29-19 11-12-18 5-20-18-16zM105 144l21-9 19 14-7 19-18 23-18-13z" fill="#747a7d" opacity="0.93"/>
          <path d="M139 65l26-10 25 18 4 23-14 11-5 29-19 11-12-18 5-20-18-16z" fill="#d94f5c" opacity="0.76"/>
          <rect x="24" y="24" width="192" height="192" fill="url(#dots-c)"/>
        </g>
      </svg>
    </div>
    <div class="card-body">
      <h3>C · 明显</h3>
      <p>暗面约降 40%，亮面约升 18%。空间感最强，但会更抢首页内容的注意力。</p>
      <div class="lighting-meta"><span>清晰晨昏线</span><span>最高对比</span></div>
    </div>
  </div>
</div>
