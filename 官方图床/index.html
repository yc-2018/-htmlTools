<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片上传工具</title>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.5rem;
    }

    .subtitle {
      color: #7f8c8d;
      font-size: 1.1rem;
    }

    .upload-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
    }

    .upload-box {
      flex: 1;
      min-width: 300px;
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .upload-area {
      border: 2px dashed #3498db;
      border-radius: 8px;
      padding: 30px 20px;
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.3s;
    }

    .upload-area:hover {
      background-color: #f8f9fa;
      border-color: #2980b9;
    }

    .upload-area i {
      font-size: 48px;
      color: #3498db;
      margin-bottom: 15px;
    }

    .upload-area h3 {
      margin-bottom: 10px;
      color: #2c3e50;
    }

    .upload-area p {
      color: #7f8c8d;
      margin: 5px 0;
    }

    .btn {
      background: #68b8ed;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: background 0.3s;
      display: inline-block;
      margin-top: 10px;
    }

    .btn:hover {
      background: #2980b9;
    }

    .btn i {
      margin-right: 8px;
    }

    .fa-file-upload{
      margin: 0!important;
      font-size: 21px!important;
    }

    #attempt-clipboard {
      position: absolute;
      top: 234px;
      right: 65px;
      background: #b4b4ff;
      color: white;
      padding: 8px;
      border-radius: 9px;
      cursor: pointer;
    }
    #attempt-clipboard:hover {
      box-shadow: inset 0 0 23px #7545fcad;
    }

    #file-input {
      display: none;
    }

    .image-options {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      color: #2c3e50;
    }

    .option-check {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .option-check input {
      width: 17px;
      height: 17px;
      accent-color: #3498db;
      cursor: pointer;
    }

    .option-divider {
      width: 1px;
      height: 22px;
      background: #dfe6e9;
    }

    .size-control {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
      flex: 1;
      color: #34495e;
      transition: opacity 0.2s;
    }

    .size-control.is-disabled {
      opacity: 0.45;
    }

    .size-control input[type="range"] {
      flex: 1;
      min-width: 120px;
      accent-color: #3498db;
      cursor: pointer;
    }

    .size-control input[type="range"]:disabled {
      cursor: not-allowed;
    }

    #max-size-output {
      min-width: 32px;
      color: #3498db;
      font-weight: 700;
      text-align: right;
    }

    .size-boundary {
      color: #7f8c8d;
      font-size: 13px;
      white-space: nowrap;
    }

    .history-container {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .history-header h2 {
      color: #2c3e50;
    }

    #clear-all {
      background: #e74c3c;
    }

    #clear-all:hover {
      background: #c0392b;
    }

    .history-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #ecf0f1;
      gap: 15px;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-thumb {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
    }

    .history-info {
      flex: 1;
      overflow: hidden;
    }

    .history-info a {
      color: #3498db;
      text-decoration: none;
      font-weight: 500;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-info a:hover {
      text-decoration: underline;
    }

    .history-info span {
      color: #7f8c8d;
      font-size: 0.9rem;
    }

    .history-actions {
      display: flex;
      gap: 10px;
    }

    .action-btn {
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .copy-btn {
      background: #2ecc71;
      color: white;
      border: none;
    }

    .copy-btn:hover {
      background: #27ae60;
    }

    .delete-btn {
      background: #e74c3c;
      color: white;
      border: none;
    }

    .delete-btn:hover {
      background: #c0392b;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      background: #2ecc71;
      color: white;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      transform: translateX(100%);
      transition: transform 0.3s;
      z-index: 1000;
    }

    .notification.show {
      transform: translateX(0);
    }

    .progress-bar {
      height: 5px;
      background: #3498db;
      width: 0;
      border-radius: 3px;
      transition: width 0.3s;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      .upload-container {
        flex-direction: column;
      }

      .history-item {
        flex-direction: column;
        text-align: center;
      }

      .history-actions {
        width: 100%;
        justify-content: center;
      }

      .image-options {
        align-items: flex-start;
        gap: 12px;
      }

      .option-divider {
        display: none;
      }

      .size-control {
        flex-basis: 100%;
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>图片上传工具</h1>
    <p class="subtitle">支持文件选择、拖拽上传和粘贴截图，上传后自动保存记录</p>
  </header>

  <div class="upload-container">
    <div class="upload-box">
      <h2>选择图片上传</h2>
      <div class="upload-area" id="drop-area">
        <i class="fas fa-cloud-upload-alt"></i>
        <h3>拖放图片到此处</h3>
        <p>或</p>
        <p>点击选择图片文件</p>
        <p>支持 Ctrl+V 粘贴截图</p>
        <div class="btn"><i class="fas fa-file-upload"></i> 选择图片</div>
        <input type="file" id="file-input" accept="image/*">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div id="attempt-clipboard">尝试上传剪贴板图片</div>
  </div>

  <div class="image-options" aria-label="图片处理选项">
    <label class="option-check" for="convert-webp">
      <input type="checkbox" id="convert-webp" checked>
      <span>转 WebP</span>
    </label>
    <span class="option-divider" aria-hidden="true"></span>
    <label class="option-check" for="compress-enabled">
      <input type="checkbox" id="compress-enabled">
      <span>压缩图片</span>
    </label>
    <div class="size-control is-disabled" id="compress-size-control">
      <span>最大</span>
      <span class="size-boundary">1m</span>
      <input type="range" id="max-size-range" min="1" max="10" step="1" value="3" disabled>
      <span class="size-boundary">10m</span>
      <output id="max-size-output" for="max-size-range">3m</output>
    </div>
  </div>

  <div class="history-container">
    <div class="history-header">
      <h2>上传历史记录</h2>
      <button class="btn" id="clear-all"><i class="fas fa-trash"></i> 清除全部</button>
    </div>
    <div class="history-list" id="history-list">
      <!-- 历史记录将在这里动态生成 -->
    </div>
  </div>
</div>

<div class="notification" id="notification">链接已复制到剪贴板！</div>

<script>
  const u = [102, 115, 100, 122, 45, 117, 115, 101, 114, 46, 106, 100, 46, 99, 111, 109, 47, 97, 112, 105, 47, 118, 49, 47, 99, 111, 109, 109, 111, 110, 47, 117, 112, 108, 111, 97, 100]
  document.addEventListener('DOMContentLoaded', function () {
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const historyList = document.getElementById('history-list');
    const clearAllBtn = document.getElementById('clear-all');
    const notification = document.getElementById('notification');
    const progressBar = document.getElementById('progress-bar');
    const attemptClipboard = document.getElementById('attempt-clipboard');
    const convertWebpInput = document.getElementById('convert-webp');
    const compressEnabledInput = document.getElementById('compress-enabled');
    const compressSizeControl = document.getElementById('compress-size-control');
    const maxSizeRange = document.getElementById('max-size-range');
    const maxSizeOutput = document.getElementById('max-size-output');
    const compressibleImageTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/bmp'];
    const imageExtMap = {
      'image/jpeg': 'jpg',
      'image/png': 'png',
      'image/webp': 'webp',
      'image/bmp': 'bmp'
    };

    // 加载历史记录
    loadHistory();
    syncCompressControls();

    compressEnabledInput.addEventListener('change', syncCompressControls);
    maxSizeRange.addEventListener('input', updateMaxSizeOutput);

    function syncCompressControls() {
      const enabled = compressEnabledInput.checked;
      maxSizeRange.disabled = !enabled;
      compressSizeControl.classList.toggle('is-disabled', !enabled);
      updateMaxSizeOutput();
    }

    function updateMaxSizeOutput() {
      maxSizeOutput.textContent = maxSizeRange.value + 'm';
    }

    // 点击上传区域触发文件选择
    dropArea.addEventListener('click', function () {
      fileInput.click();
    });

    // 按钮点击事件 - 读取剪贴板图片
    attemptClipboard.addEventListener('click', async function () {
      try {
        // 读取剪贴板内容
        const clipboardItems = await navigator.clipboard.read();

        for (const clipboardItem of clipboardItems) {
          for (const type of clipboardItem.types) {
            if (type.startsWith('image/')) {
              const blob = await clipboardItem.getType(type);
              // 将Blob转换为File对象
              const file = new File([blob], 'image.png', {type: blob.type, lastModified: Date.now()});
              // 显示预览
              uploadFile(file);
              return;
            }
          }
        }
        showNotification('剪贴板中没有找到图片', false);
      } catch (err) {
        showNotification('无法读取剪贴板内容: ' + err.message, false);
      }
    });

    // 文件选择变化
    fileInput.addEventListener('change', function () {
      if (this.files.length > 0) {
        const selectedFile = this.files[0];
        this.value = '';
        uploadFile(selectedFile);
      }
    });

    // 防止拖放时浏览器默认行为
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    // 拖放区域高亮
    ['dragenter', 'dragover'].forEach(eventName => {
      dropArea.addEventListener(eventName, highlight, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, unhighlight, false);
    });

    function highlight() {
      dropArea.style.borderColor = '#27ae60';
      dropArea.style.backgroundColor = '#f8f9fa';
    }

    function unhighlight() {
      dropArea.style.borderColor = '#3498db';
      dropArea.style.backgroundColor = 'transparent';
    }

    // 处理文件拖放
    dropArea.addEventListener('drop', function (e) {
      const dt = e.dataTransfer;
      const files = dt.files;
      if (files.length > 0) {
        uploadFile(files[0]);
      }
    });

    // 处理粘贴事件
    document.addEventListener('paste', function (e) {
      const items = e.clipboardData.items;
      for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
          const blob = items[i].getAsFile();
          uploadFile(blob);
          break;
        }
      }
    });

    // 上传文件函数
    async function uploadFile(file) {
      if (!file || !file.type.match('image.*')) {
        showNotification('请选择图片文件！', false);
        return;
      }

      progressBar.style.width = '0%';
      const fileForUpload = await prepareImageForUpload(file);

      const formData = new FormData();
      formData.append('file', fileForUpload);

      // 显示进度条
      progressBar.style.width = '0%';

      // 使用fetch API上传文件
      const xhr = new XMLHttpRequest();

      // 监听上传进度
      xhr.upload.addEventListener('progress', function (e) {
        if (e.lengthComputable) {
          const percentComplete = (e.loaded / e.total) * 100;
          progressBar.style.width = percentComplete + '%';
        }
      });

      xhr.open('POST', `https://${u.map(v => String.fromCharCode(v)).join('')}`, true);

      xhr.onload = function () {
        if (xhr.status === 200) {
          try {
            const response = JSON.parse(xhr.responseText);
            if (response.code === 200) {
              handleUploadSuccess(response);
            } else {
              showNotification('上传失败: ' + response.message, false);
            }
          } catch (e) {
            showNotification('解析响应失败: ' + e.message, false);
          }
        } else {
          showNotification('上传失败，状态码: ' + xhr.status, false);
        }
        progressBar.style.width = '0%';
      };

      xhr.onerror = function () {
        showNotification('网络错误，上传失败', false);
        progressBar.style.width = '0%';
      };

      xhr.send(formData);
    }

    async function prepareImageForUpload(file) {
      const shouldConvertWebp = convertWebpInput.checked;
      const shouldCompress = compressEnabledInput.checked;

      if (!shouldConvertWebp && !shouldCompress) {
        return file;
      }

      if (!compressibleImageTypes.includes(file.type)) {
        showNotification('当前图片类型不支持浏览器内处理，已按原图上传', false);
        return file;
      }

      try {
        const targetType = shouldConvertWebp ? 'image/webp' : getOriginalOutputType(file.type);
        const maxSizeMb = Number(maxSizeRange.value);
        const maxSizeBytes = maxSizeMb * 1024 * 1024;
        let sourceFile = file;

        progressBar.style.width = '8%';

        if (targetType !== file.type) {
          const convertedFile = await renderImageFile(file, targetType, 0.95);
          if (convertedFile) {
            sourceFile = convertedFile;
          }

          if (!shouldCompress) {
            return sourceFile;
          }

          if (sourceFile.size <= maxSizeBytes) {
            return sourceFile;
          }
        }

        if (!shouldCompress || sourceFile.size <= maxSizeBytes) {
          return sourceFile;
        }

        progressBar.style.width = '16%';
        return await compressImageToMax(sourceFile, maxSizeMb, targetType);
      } catch (error) {
        console.error('图片处理失败:', error);
        showNotification('图片处理失败，已按原图上传', false);
        return file;
      }
    }

    function getOriginalOutputType(type) {
      return type === 'image/jpeg' || type === 'image/png' || type === 'image/webp'
        ? type
        : 'image/jpeg';
    }

    async function compressImageToMax(file, maxSizeMb, targetType) {
      const maxSizeBytes = maxSizeMb * 1024 * 1024;
      const sourceImage = await loadImageSource(file);
      const originalMaxSide = Math.max(sourceImage.width, sourceImage.height);
      let maxWidthOrHeight = Math.min(originalMaxSide, 1920);
      let bestFile = null;

      try {
        for (let resizeRound = 0; resizeRound < 8; resizeRound++) {
          const canvas = drawImageToCanvas(sourceImage, maxWidthOrHeight, targetType);
          const qualityList = targetType === 'image/png'
            ? [0.92]
            : [0.85, 0.75, 0.65, 0.55, 0.45, 0.35];

          for (const quality of qualityList) {
            const candidate = await canvasToImageFile(canvas, file.name, targetType, quality, file.lastModified);
            if (!candidate) {
              continue;
            }

            if (!bestFile || candidate.size < bestFile.size) {
              bestFile = candidate;
            }

            if (candidate.size <= maxSizeBytes) {
              return candidate;
            }
          }

          if (maxWidthOrHeight <= 420) {
            break;
          }
          maxWidthOrHeight = Math.max(420, Math.floor(maxWidthOrHeight * 0.78));
        }
      } finally {
        sourceImage.cleanup();
      }

      if (bestFile && bestFile.size < file.size) {
        console.warn(`压缩后文件仍大于${maxSizeMb}MB:`, formatFileSize(bestFile.size));
        return bestFile;
      }

      console.warn(`压缩未得到更小文件，保留原图:`, file.name);
      return file;
    }

    async function renderImageFile(file, type, quality) {
      const sourceImage = await loadImageSource(file);
      try {
        const canvas = drawImageToCanvas(sourceImage, null, type);
        return await canvasToImageFile(canvas, file.name, type, quality, file.lastModified);
      } finally {
        sourceImage.cleanup();
      }
    }

    async function loadImageSource(file) {
      if ('createImageBitmap' in window) {
        try {
          const bitmap = await createImageBitmap(file);
          return {
            source: bitmap,
            width: bitmap.width,
            height: bitmap.height,
            cleanup: () => bitmap.close && bitmap.close()
          };
        } catch (error) {
          console.warn('createImageBitmap 读取失败，使用 Image 回退:', error);
        }
      }

      const url = URL.createObjectURL(file);
      const image = new Image();
      image.decoding = 'async';
      image.src = url;

      await new Promise((resolve, reject) => {
        image.onload = resolve;
        image.onerror = () => reject(new Error('图片读取失败'));
      });

      return {
        source: image,
        width: image.naturalWidth || image.width,
        height: image.naturalHeight || image.height,
        cleanup: () => URL.revokeObjectURL(url)
      };
    }

    function drawImageToCanvas(sourceImage, maxWidthOrHeight, outputType) {
      const maxSide = Math.max(sourceImage.width, sourceImage.height);
      const scale = maxWidthOrHeight ? Math.min(1, maxWidthOrHeight / maxSide) : 1;
      const width = Math.max(1, Math.round(sourceImage.width * scale));
      const height = Math.max(1, Math.round(sourceImage.height * scale));
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = width;
      canvas.height = height;

      if (outputType === 'image/jpeg') {
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, width, height);
      }

      ctx.drawImage(sourceImage.source, 0, 0, width, height);
      return canvas;
    }

    function canvasToImageFile(canvas, originalName, type, quality, lastModified) {
      return new Promise(resolve => {
        canvas.toBlob(blob => {
          if (!blob) {
            resolve(null);
            return;
          }

          const actualType = blob.type || type;
          resolve(new File(
            [blob],
            replaceImageExt(originalName, actualType),
            {type: actualType, lastModified}
          ));
        }, type, quality);
      });
    }

    function replaceImageExt(name, type) {
      const ext = imageExtMap[type] || 'jpg';
      return name.match(/\.[^.]+$/) ? name.replace(/\.[^.]+$/, `.${ext}`) : `${name}.${ext}`;
    }

    function formatFileSize(size) {
      return (size / 1024 / 1024).toFixed(2) + 'MB';
    }

    // 处理上传成功
    async function handleUploadSuccess(response) {
      if (response.code === 200) {

        let okCopy = false;
        await navigator.clipboard.writeText(response.data.url).then(() => okCopy = true);

        const tip = okCopy ? '且已自动复制链接到剪贴板！' : '但自动复制链接到剪贴板失败！';

        showNotification(`图片上传成功！${tip}`, true);
        addToHistory(response.data);

      } else {
        showNotification('上传失败: ' + response.message, false);
      }
    }

    // 添加到历史记录
    function addToHistory(fileData) {
      let history = JSON.parse(localStorage.getItem('uploadHistory') || '[]');

      // 生成缩略图URL
      const thumbUrl = fileData.url.replace(
        '/cxxjwimg/jfs',
        '/jdcms/s180x180_jfs'
      );

      // 添加到开头
      history.unshift({
        url: fileData.url,
        thumbUrl: thumbUrl,
        name: fileData.originalFilename,
        time: new Date().toISOString()
      });

      // 限制最多保存30条记录
      if (history.length > 30) {
        history = history.slice(0, 30);
      }

      localStorage.setItem('uploadHistory', JSON.stringify(history));
      loadHistory();
    }

    // 加载历史记录
    function loadHistory() {
      const history = JSON.parse(localStorage.getItem('uploadHistory') || '[]');
      historyList.innerHTML = '';

      if (history.length === 0) {
        historyList.innerHTML = '<p style="text-align: center; color: #7f8c8d; padding: 20px;">暂无上传记录</p>';
        return;
      }

      history.forEach((item, index) => {
        const historyItem = document.createElement('div');
        historyItem.className = 'history-item';

        historyItem.innerHTML = `
                        <img src="${item.thumbUrl}" alt="${item.name}" class="history-thumb" onerror="this.src='${item.url}'">
                        <div class="history-info">
                            <a href="${item.url}" target="_blank">${item.url}</a>
                            <span>${new Date(item.time).toLocaleString()} · ${item.name}</span>
                        </div>
                        <div class="history-actions">
                            <button class="action-btn copy-btn" data-url="${item.url}"><i class="fas fa-copy"></i> 复制</button>
                            <button class="action-btn delete-btn" data-index="${index}"><i class="fas fa-trash"></i> 删除</button>
                        </div>
                    `;

        historyList.appendChild(historyItem);
      });
    }

    // 复制链接
    historyList.addEventListener('click', function (e) {
      if (e.target.classList.contains('copy-btn') || e.target.parentElement.classList.contains('copy-btn')) {
        const btn = e.target.classList.contains('copy-btn') ? e.target : e.target.parentElement;
        const url = btn.getAttribute('data-url');

        navigator.clipboard.writeText(url).then(() => {
          showNotification('链接已复制到剪贴板！', true);
        }).catch(err => {
          showNotification('复制失败: ' + err, false);
        });
      }

      if (e.target.classList.contains('delete-btn') || e.target.parentElement.classList.contains('delete-btn')) {
        const btn = e.target.classList.contains('delete-btn') ? e.target : e.target.parentElement;
        const index = parseInt(btn.getAttribute('data-index'));

        let history = JSON.parse(localStorage.getItem('uploadHistory') || '[]');
        history.splice(index, 1);
        localStorage.setItem('uploadHistory', JSON.stringify(history));
        loadHistory();

        showNotification('记录已删除！', true);
      }
    });

    // 清除全部记录
    clearAllBtn.addEventListener('click', function () {
      if (confirm('确定要清除所有上传记录吗？')) {
        localStorage.removeItem('uploadHistory');
        loadHistory();
        showNotification('所有记录已清除！', true);
      }
    });

    // 显示通知
    function showNotification(message, isSuccess) {
      notification.textContent = message;
      notification.style.background = isSuccess ? '#2ecc71' : '#e74c3c';
      notification.classList.add('show');

      setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }
  });
</script>
</body>
</html>
