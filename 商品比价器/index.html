<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>商品比价器</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #eef3f6 0%, #f8fafc 100%);
      color: #1f2937;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .app {
      width: min(1100px, calc(100% - 24px));
      margin: 0 auto;
      padding: 16px 0 28px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .back {
      color: #0f766e;
      text-decoration: none;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #d8e0e8;
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .row label {
      font-size: 14px;
      color: #475569;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="number"] {
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
      background: #fbfdff;
    }

    input[type="number"]:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
    }

    .result {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e2e8f0;
      font-size: 15px;
      line-height: 1.7;
    }

    .result strong {
      font-size: 18px;
    }

    .price-good {
      color: #15803d;
      font-weight: 700;
    }

    .price-expensive {
      color: #b45309;
      font-weight: 700;
    }

    .summary {
      margin-top: 14px;
      background: #fff;
      border: 1px solid #d8e0e8;
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
      font-size: 18px;
      text-align: center;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #64748b;
      text-align: center;
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .header {
        align-items: flex-start;
        flex-direction: column-reverse;
      }
    }
  </style>
</head>
<body>
<main class="app">
  <header class="header">
    <h1>商品比价器</h1>
    <a class="back" href="../index.html">返回首页</a>
  </header>

  <section class="grid">
    <article class="card">
      <h2>商品1</h2>
      <div class="row">
        <label for="weight1">重量</label>
        <div class="field">
          <input id="weight1" type="number" min="0" step="1" placeholder="克">
        </div>
      </div>
      <div class="row">
        <label for="price1">价格</label>
        <div class="field">
          <input id="price1" type="number" min="0" step="0.01" placeholder="元">
        </div>
      </div>
      <div class="result" id="result1"></div>
    </article>

    <article class="card">
      <h2>商品2</h2>
      <div class="row">
        <label for="weight2">重量</label>
        <div class="field">
          <input id="weight2" type="number" min="0" step="1" placeholder="克">
        </div>
      </div>
      <div class="row">
        <label for="price2">价格</label>
        <div class="field">
          <input id="price2" type="number" min="0" step="0.01" placeholder="元">
        </div>
      </div>
      <div class="result" id="result2"></div>
    </article>
  </section>

  <section class="summary" id="summary">输入商品重量和价格后自动计算</section>
  <div class="hint">每克和每斤都保留 2 位小数</div>
</main>

<script>
  (function () {
    const weight1 = document.getElementById('weight1');
    const weight2 = document.getElementById('weight2');
    const price1 = document.getElementById('price1');
    const price2 = document.getElementById('price2');
    const result1 = document.getElementById('result1');
    const result2 = document.getElementById('result2');
    const summary = document.getElementById('summary');

    function getPrice(price, weight) {
      const p = Number(price);
      const w = Number(weight);
      if (!p || !w) {
        return null;
      }

      const perGram = p / w;
      const perJin = perGram * 500;
      return {
        perGram: perGram.toFixed(2),
        perJin: perJin.toFixed(2)
      };
    }

    function getCompare(priceA, priceB) {
      if (!priceA || !priceB) {
        return '';
      }

      if (Number(priceA) > Number(priceB)) {
        return '<div class="price-expensive">贵</div>';
      }

      return '<div class="price-good">平</div>';
    }

    function render() {
      const p1 = getPrice(price1.value, weight1.value);
      const p2 = getPrice(price2.value, weight2.value);

      result1.innerHTML = p1
        ? '每克: <strong>' + p1.perGram + '</strong> 元<br>一斤: <strong>' + p1.perJin + '</strong> 元' + getCompare(p1.perGram, p2 && p2.perGram)
        : '请输入重量和价格';

      result2.innerHTML = p2
        ? '每克: <strong>' + p2.perGram + '</strong> 元<br>一斤: <strong>' + p2.perJin + '</strong> 元' + getCompare(p2.perGram, p1 && p1.perGram)
        : '请输入重量和价格';

      if (p1 && p2) {
        const diff = Math.abs(Number(p1.perJin) - Number(p2.perJin)).toFixed(2);
        summary.textContent = '每斤差 ' + diff + ' 元';
      } else {
        summary.textContent = '输入商品重量和价格后自动计算';
      }
    }

    [weight1, weight2, price1, price2].forEach(function (el) {
      el.addEventListener('input', render);
    });

    render();
  })();
</script>
</body>
</html>
