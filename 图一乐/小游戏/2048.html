<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            text-shadow: 0 0 30px rgba(243, 156, 18, 0.5);
        }

        .score-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 28px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .score-label {
            color: #888;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-value {
            color: #fff;
            font-size: 1.8rem;
            font-weight: bold;
        }

        #currentScore { color: #f39c12; }
        #bestScore { color: #00fff5; }

        .grid-container {
            display: inline-block;
            padding: 12px;
            background: linear-gradient(135deg, #00fff5, #ff00ff);
            border-radius: 16px;
            box-shadow: 0 0 50px rgba(0, 255, 245, 0.3);
            touch-action: none;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 90px);
            grid-template-rows: repeat(4, 90px);
            gap: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 10px;
        }

        .tile {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            border-radius: 8px;
            transition: all 0.15s ease;
            animation: pop 0.15s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.8rem; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.8rem; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.8rem; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.5rem; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.5rem; box-shadow: 0 0 30px #edc22e; }
        .tile-empty { background: rgba(255, 255, 255, 0.05); }

        .controls {
            margin-top: 20px;
        }

        .btn {
            padding: 12px 36px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.4);
        }

        .instructions {
            margin-top: 16px;
            color: #666;
            font-size: 0.85rem;
        }

        .instructions span { color: #00fff5; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .overlay.active { opacity: 1; visibility: visible; }

        .overlay h2 {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .overlay.win h2 { color: #f39c12; text-shadow: 0 0 30px #f39c12; }
        .overlay.lose h2 { color: #e74c3c; text-shadow: 0 0 30px #e74c3c; }

        .overlay p { color: #fff; font-size: 1.2rem; margin-bottom: 24px; }



        @media (max-width: 500px) {
            h1 { font-size: 2.5rem; }
            #grid {
                grid-template-columns: repeat(4, 70px);
                grid-template-rows: repeat(4, 70px);
                gap: 8px;
            }
            .tile { font-size: 1.5rem; }
            .tile-128, .tile-256, .tile-512 { font-size: 1.3rem; }
            .tile-1024, .tile-2048 { font-size: 1.1rem; }

        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>2048</h1>

        <div class="score-panel">
            <div class="score-box">
                <div class="score-label">分数</div>
                <div class="score-value" id="currentScore">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">最高分</div>
                <div class="score-value" id="bestScore">0</div>
            </div>
        </div>

        <div class="grid-container">
            <div id="grid"></div>
        </div>

        <div class="controls">
            <button class="btn" onclick="initGame()">新游戏</button>
        </div>

        <div class="instructions">
            <span>方向键</span> / <span>WASD</span> / <span>滑动屏幕</span> 移动方块
        </div>


    </div>

    <div class="overlay" id="overlay">
        <h2 id="overlayTitle">游戏结束</h2>
        <p id="overlayText">最终得分: 0</p>
        <button class="btn" onclick="closeOverlay(); initGame();">再来一局</button>
    </div>

    <script>
        let grid = [];
        let score = 0;
        let bestScore = localStorage.getItem('best2048') || 0;
        let gameOver = false;

        document.getElementById('bestScore').textContent = bestScore;
        initGame();

        function initGame() {
            grid = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            gameOver = false;
            document.getElementById('currentScore').textContent = 0;
            closeOverlay();
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) empty.push({ r, c });
                }
            }
            if (empty.length === 0) return false;
            const { r, c } = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            return true;
        }

        function render() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const val = grid[r][c];
                    const tile = document.createElement('div');
                    tile.className = 'tile ' + (val ? `tile-${val}` : 'tile-empty');
                    tile.textContent = val || '';
                    gridEl.appendChild(tile);
                }
            }
        }

        function slide(row) {
            let arr = row.filter(x => x !== 0);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr.splice(i + 1, 1);
                }
            }
            while (arr.length < 4) arr.push(0);
            return arr;
        }

        function move(direction) {
            if (gameOver) return;

            let moved = false;
            const oldGrid = JSON.stringify(grid);

            if (direction === 'left') {
                for (let r = 0; r < 4; r++) grid[r] = slide(grid[r]);
            } else if (direction === 'right') {
                for (let r = 0; r < 4; r++) grid[r] = slide(grid[r].reverse()).reverse();
            } else if (direction === 'up') {
                for (let c = 0; c < 4; c++) {
                    let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
                    col = slide(col);
                    for (let r = 0; r < 4; r++) grid[r][c] = col[r];
                }
            } else if (direction === 'down') {
                for (let c = 0; c < 4; c++) {
                    let col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]];
                    col = slide(col);
                    for (let r = 0; r < 4; r++) grid[3 - r][c] = col[r];
                }
            }

            moved = oldGrid !== JSON.stringify(grid);

            if (moved) {
                addRandomTile();
                document.getElementById('currentScore').textContent = score;
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('best2048', bestScore);
                    document.getElementById('bestScore').textContent = bestScore;
                }
                render();
                checkGameState();
            }
        }

        function checkGameState() {
            // Check for 2048 win
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 2048) {
                        showOverlay('win');
                        return;
                    }
                }
            }

            // Check for possible moves
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return;
                    if (r < 3 && grid[r][c] === grid[r + 1][c]) return;
                    if (c < 3 && grid[r][c] === grid[r][c + 1]) return;
                }
            }

            showOverlay('lose');
        }

        function showOverlay(type) {
            gameOver = true;
            const overlay = document.getElementById('overlay');
            const title = document.getElementById('overlayTitle');
            const text = document.getElementById('overlayText');
            
            overlay.className = 'overlay active ' + type;
            title.textContent = type === 'win' ? '🎉 胜利!' : '游戏结束';
            text.textContent = `最终得分: ${score}`;
        }

        function closeOverlay() {
            document.getElementById('overlay').classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W': move('up'); break;
                case 'ArrowDown': case 's': case 'S': move('down'); break;
                case 'ArrowLeft': case 'a': case 'A': move('left'); break;
                case 'ArrowRight': case 'd': case 'D': move('right'); break;
            }
        });

        // Swipe gesture support
        let touchStartX = 0, touchStartY = 0;
        const swipeArea = document.querySelector('.grid-container');
        swipeArea.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        swipeArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
        swipeArea.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);
            if (Math.max(absDx, absDy) < 30) return;
            if (absDx > absDy) {
                move(dx > 0 ? 'right' : 'left');
            } else {
                move(dy > 0 ? 'down' : 'up');
            }
        });
    </script>
</body>
</html>
