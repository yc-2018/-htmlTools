<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>打砖块</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;margin:0 auto}
#ui{position:absolute;top:0;left:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;color:#fff;font-family:system-ui,-apple-system,sans-serif;font-size:16px;z-index:10;pointer-events:none}
#ui span{background:rgba(0,0,0,.5);padding:4px 12px;border-radius:8px}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;font-family:system-ui,-apple-system,sans-serif;z-index:20;background:rgba(10,10,26,.9)}
#overlay h1{font-size:32px;margin-bottom:8px}
#overlay p{font-size:15px;margin:4px 0;color:#aaa}
#speedSelect{display:flex;gap:10px;margin:16px 0 4px;pointer-events:all}
#speedSelect button{padding:10px 20px;font-size:16px;border:2px solid transparent;border-radius:10px;background:#1e1b4b;color:#c4b5fd;cursor:pointer;transition:all .15s}
#speedSelect button.active{border-color:#8b5cf6;background:#312e81;color:#fff}
#speedSelect button:active{transform:scale(.95)}
#bestLabel{font-size:14px;color:#fbbf24;margin-top:8px}
#startBtn{margin-top:16px;padding:12px 48px;font-size:20px;border:none;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;cursor:pointer;pointer-events:all}
#startBtn:active{transform:scale(.96)}
#overlay.hidden{display:none}
</style>
</head>
<body>
<div id="ui">
  <span id="scoreLabel">分数: 0</span>
  <span id="levelLabel">关卡: 1</span>
  <span id="livesLabel">❤️ 3</span>
</div>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>🧱 打砖块</h1>
  <p>手指左右滑动控制挡板</p>
  <p>选择速度：</p>
  <div id="speedSelect">
    <button data-s="1">🐢 慢</button>
    <button data-s="2" class="active">🏃 中</button>
    <button data-s="3">🚀 快</button>
  </div>
  <p id="bestLabel"></p>
  <button id="startBtn">开始游戏</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreLabel = document.getElementById('scoreLabel');
const levelLabel = document.getElementById('levelLabel');
const livesLabel = document.getElementById('livesLabel');
const startBtn = document.getElementById('startBtn');
const bestLabel = document.getElementById('bestLabel');
const speedBtns = document.querySelectorAll('#speedSelect button');

const SPEED_MAP = {1:6, 2:10, 3:16};
let chosenSpeed = 2;

// High score
function getBest() { return parseInt(localStorage.getItem('breakout_best') || '0'); }
function saveBest(s) { if (s > getBest()) localStorage.setItem('breakout_best', s); }
function showBest() {
  const b = getBest();
  bestLabel.textContent = b > 0 ? '🏆 最高分: ' + b : '';
}

speedBtns.forEach(btn => {
  const pick = () => {
    speedBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    chosenSpeed = parseInt(btn.dataset.s);
  };
  btn.addEventListener('click', pick);
  btn.addEventListener('touchend', e => { e.preventDefault(); pick(); });
});

let W, H, PADDLE_W, PADDLE_H, BALL_R, COLS, ROWS, BRICK_W, BRICK_H, BRICK_PAD, BRICK_TOP;
let paddleX, ballX, ballY, ballVX, ballVY;
let bricks = [], score = 0, lives = 3, level = 1, gameRunning = false, ballStuck = true;

const COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899'];

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  COLS = W < 400 ? 6 : 8;
  ROWS = 6;
  BRICK_PAD = 4;
  BRICK_W = (W - BRICK_PAD * (COLS + 1)) / COLS;
  BRICK_H = Math.max(20, Math.min(28, H * 0.03));
  BRICK_TOP = 50;
  PADDLE_W = W * 0.22;
  PADDLE_H = 14;
  BALL_R = Math.max(6, W * 0.018);
  if (ballStuck) { paddleX = W / 2 - PADDLE_W / 2; ballX = W / 2; ballY = H - 40 - BALL_R; }
}
window.addEventListener('resize', resize);

function initBricks() {
  bricks = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      bricks.push({
        x: BRICK_PAD + c * (BRICK_W + BRICK_PAD),
        y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W, h: BRICK_H,
        color: COLORS[r % COLORS.length],
        alive: true,
        hp: r < 2 ? 2 : 1
      });
}

function resetBall() {
  paddleX = W / 2 - PADDLE_W / 2;
  ballX = W / 2; ballY = H - 40 - BALL_R;
  ballStuck = true;
  const spd = SPEED_MAP[chosenSpeed] + level * 0.8;
  ballVX = (Math.random() > 0.5 ? 1 : -1) * spd * 0.7;
  ballVY = -spd;
}

function startGame() {
  score = 0; lives = 3; level = 1;
  initBricks(); resize(); resetBall();
  overlay.classList.add('hidden');
  gameRunning = true;
  updateLabels();
}

function nextLevel() {
  level++;
  initBricks(); resize(); resetBall();
  updateLabels();
}

function updateLabels() {
  scoreLabel.textContent = '分数: ' + score;
  levelLabel.textContent = '关卡: ' + level;
  livesLabel.textContent = '❤️ ' + lives;
}

function showEnd(title, btnText, onclick) {
  gameRunning = false;
  saveBest(score); showBest();
  overlay.querySelector('h1').textContent = title;
  overlay.querySelector('p').textContent = '分数: ' + score + (getBest() === score && score > 0 ? ' 🏆 新纪录！' : '');
  startBtn.textContent = btnText;
  startBtn.onclick = onclick;
  overlay.classList.remove('hidden');
}

// Touch
let touchStartX = null, paddleStartX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStartX = t.clientX; paddleStartX = paddleX;
  if (ballStuck) ballStuck = false;
}, {passive: false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchStartX === null) return;
  const dx = e.touches[0].clientX - touchStartX;
  paddleX = Math.max(0, Math.min(W - PADDLE_W, paddleStartX + dx));
}, {passive: false});
canvas.addEventListener('touchend', e => { touchStartX = null; });

canvas.addEventListener('mousedown', e => { if (ballStuck) ballStuck = false; });
canvas.addEventListener('mousemove', e => {
  if (e.buttons) paddleX = Math.max(0, Math.min(W - PADDLE_W, e.clientX - PADDLE_W / 2));
});

startBtn.addEventListener('click', startGame);
startBtn.addEventListener('touchend', e => { e.preventDefault(); startGame(); });

function update() {
  if (!gameRunning) return;
  if (ballStuck) { ballX = paddleX + PADDLE_W / 2; ballY = H - 40 - BALL_R; return; }

  ballX += ballVX; ballY += ballVY;

  if (ballX - BALL_R <= 0) { ballX = BALL_R; ballVX = Math.abs(ballVX); }
  if (ballX + BALL_R >= W) { ballX = W - BALL_R; ballVX = -Math.abs(ballVX); }
  if (ballY - BALL_R <= 0) { ballY = BALL_R; ballVY = Math.abs(ballVY); }

  const pY = H - 30;
  if (ballVY > 0 && ballY + BALL_R >= pY && ballY + BALL_R <= pY + PADDLE_H + 6 &&
      ballX >= paddleX - BALL_R && ballX <= paddleX + PADDLE_W + BALL_R) {
    ballY = pY - BALL_R;
    ballVY = -Math.abs(ballVY);
    const hit = (ballX - paddleX) / PADDLE_W - 0.5;
    const spd = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
    ballVX = hit * spd * 1.6;
    ballVY = -Math.sqrt(Math.max(spd * spd - ballVX * ballVX, 1));
  }

  for (const b of bricks) {
    if (!b.alive) continue;
    if (ballX + BALL_R > b.x && ballX - BALL_R < b.x + b.w &&
        ballY + BALL_R > b.y && ballY - BALL_R < b.y + b.h) {
      b.hp--;
      if (b.hp <= 0) { b.alive = false; score += 10 * level; }
      const overlapL = (ballX + BALL_R) - b.x;
      const overlapR = (b.x + b.w) - (ballX - BALL_R);
      const overlapT = (ballY + BALL_R) - b.y;
      const overlapB = (b.y + b.h) - (ballY - BALL_R);
      const minO = Math.min(overlapL, overlapR, overlapT, overlapB);
      if (minO === overlapT || minO === overlapB) ballVY = -ballVY;
      else ballVX = -ballVX;
      break;
    }
  }

  if (ballY - BALL_R > H) {
    lives--; updateLabels();
    if (lives <= 0) { showEnd('💀 游戏结束', '重新开始', startGame); return; }
    resetBall();
  }

  if (bricks.every(b => !b.alive)) {
    showEnd('🎉 通关！', '下一关', () => { nextLevel(); overlay.classList.add('hidden'); gameRunning = true; });
  }

  updateLabels();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    ctx.globalAlpha = b.hp > 1 ? 1 : 0.6;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 4);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, b.h / 3);
  }
  const pY = H - 30;
  const grad = ctx.createLinearGradient(paddleX, pY, paddleX, pY + PADDLE_H);
  grad.addColorStop(0, '#a78bfa'); grad.addColorStop(1, '#6366f1');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(paddleX, pY, PADDLE_W, PADDLE_H, 7);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(ballX, ballY, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 12;
  ctx.fill();
  ctx.shadowBlur = 0;
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
resize(); showBest(); loop();
</script>
</body>
</html>
